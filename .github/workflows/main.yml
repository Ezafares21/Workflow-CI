name: CI Pipeline MLflow & Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn matplotlib seaborn dagshub

    - name: Run MLflow Project
      env:
        MLFLOW_TRACKING_URI: https://dagshub.com/Ezafares21/Eksperimen_SML_Reza-Al-Pares.mlflow
        MLFLOW_TRACKING_USERNAME: Ezafares21
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        mlflow run ./MLProject --env-manager=local

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image via MLflow
      run: |
        mlflow models build-docker -m ./model_lokal -n ${{ secrets.DOCKER_USERNAME }}/eksperimen-sml:latest

    - name: Push Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/eksperimen-sml:latest
